name: Security Agent

on:
  pull_request:
  push:
    branches:
      - main
      - full-agent-intake-report-api

jobs:
  security-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security agent
        run: npm run security:agent
